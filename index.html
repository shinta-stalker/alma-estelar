<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crónica de un Alma Estelar — El Ritual del Destino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --oro:#d4af37;--oro2:#f5d76e;
  --azul:#4fc3f7;--rosa:#f06292;
  --void:#030208;--cristal:rgba(6,3,14,0.7);
  --fd:'Cinzel Decorative',serif;
  --ft:'Cinzel',serif;
  --fb:'IM Fell English',serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--void);color:#e8d8b0;cursor:crosshair}
#c3d{position:fixed;inset:0;z-index:1;display:block}

/* TÍTULO Y TEXTOS (Mantenemos tu hermoso UI) */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:20;
  text-align:center;padding:25px 0 15px;
  background:linear-gradient(to bottom,rgba(3,2,8,0.95) 40%,transparent);
  pointer-events:none;
}
#hdr h1{font-family:var(--fd);font-size:clamp(12pt,3vw,18pt);font-weight:700;
  letter-spacing:5px;color:var(--oro2);text-shadow:0 0 20px rgba(212,175,55,0.8),0 0 40px rgba(212,175,55,0.5)}
#hdr p{font-family:var(--fb);font-size:clamp(9pt,1.5vw,11pt);color:rgba(212,175,55,0.7);
  letter-spacing:4px;font-style:italic;margin-top:5px}

#instruccion{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  z-index:20;text-align:center;pointer-events:none;
  transition:opacity 1.2s;
}
#instruccion p{font-family:var(--fb);font-size:clamp(10pt,2vw,12pt);
  color:rgba(212,175,55,0.8);letter-spacing:3px;font-style:italic;
  text-shadow:0 0 20px rgba(212,175,55,0.6);animation:flicker 4s ease-in-out infinite}
@keyframes flicker{0%,100%{opacity:.4}50%{opacity:1}}

/* PANEL MAGICO */
.panel{
  position:fixed;bottom:5vh;left:50%;transform:translateX(-50%);
  z-index:20;
  background:var(--cristal);
  border:1px solid rgba(212,175,55,0.4);
  border-radius:16px;
  padding:25px;
  width:min(450px,90vw);
  text-align:center;
  backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
  box-shadow:0 0 50px rgba(212,175,55,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
  display:none;
}
.panel.on{display:block;animation:riseIn 1s cubic-bezier(.22,1,.36,1) forwards}
@keyframes riseIn{from{opacity:0;transform:translateX(-50%) translateY(30px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.ptit{font-family:var(--fd);font-size:clamp(11pt,2.5vw,14pt);font-weight:700;
  letter-spacing:3px;color:#f5e6c0;margin-bottom:5px; text-shadow:0 0 10px rgba(212,175,55,0.5)}
.psub{font-family:var(--fb);font-size:10pt;color:rgba(212,175,55,0.7);
  font-style:italic;letter-spacing:2px;margin-bottom:20px}

/* INPUT Y BOTONES */
.campo{width:100%;padding:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(212,175,55,0.3);border-radius:8px;
  color:#fff;font-size:12pt;font-family:var(--fb);
  text-align:center;outline:none;
  transition:all .4s;margin-bottom:15px; letter-spacing: 1px;}
.campo::placeholder{color:rgba(255,255,255,0.3)}
.campo:focus{border-color:var(--oro);box-shadow:0 0 20px rgba(212,175,55,0.4), inset 0 0 10px rgba(212,175,55,0.2)}

.row{display:flex;gap:15px}
.btn{flex:1;padding:15px 10px;border-radius:10px;
  font-family:var(--ft);font-size:clamp(8pt,2vw,10pt);letter-spacing:1px; font-weight: 600;
  cursor:pointer;transition:all .3s;
  border:1px solid transparent;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.5);}
.btn:active{transform:scale(.95)}
.btn-n{background:linear-gradient(145deg,rgba(13,71,161,.6),rgba(1,28,74,.6));
  color:#aee2ff;border-color:rgba(79,195,247,.6)}
.btn-n:hover{box-shadow:0 0 40px rgba(79,195,247,.6), inset 0 0 15px rgba(79,195,247,.5); color: #fff;}
.btn-f{background:linear-gradient(145deg,rgba(136,14,79,.6),rgba(74,1,50,.6));
  color:#ffc4d9;border-color:rgba(240,98,146,.6)}
.btn-f:hover{box-shadow:0 0 40px rgba(240,98,146,.6), inset 0 0 15px rgba(240,98,146,.5); color: #fff;}
.bico{font-size:22pt;display:block;margin-bottom:8px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));}

/* PANEL ESPERA */
hr.sep{border:none;border-top:1px solid rgba(212,175,55,.3);margin:15px 0}
#reloj{font-family:var(--fd);font-size:clamp(18pt,4vw,26pt);
  letter-spacing:4px;color:var(--oro2);
  text-shadow:0 0 40px rgba(212,175,55,.8);margin:5px 0 10px}
.bwrap{height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;display:flex}
#bn{height:100%;background:linear-gradient(90deg,#0d47a1,var(--azul));
  transition:width 1.5s cubic-bezier(0.4, 0, 0.2, 1);box-shadow:0 0 15px rgba(79,195,247,.9)}
#bf{height:100%;background:linear-gradient(90deg,#880e4f,var(--rosa));
  transition:width 1.5s cubic-bezier(0.4, 0, 0.2, 1);box-shadow:0 0 15px rgba(240,98,146,.9)}
.vtxt{display:flex;justify-content:space-between;font-size:9pt;margin-top:8px;
  color:rgba(212,175,55,.7);font-family:var(--ft);letter-spacing:1px; font-weight: 600;}

/* REVELACIÓN FINAL */
#revc h1{font-family:var(--fd);font-size:clamp(22pt,5vw,34pt);font-weight:700;
  letter-spacing:5px;animation:glowPulse 1.5s ease-in-out infinite alternate}
#revc p{font-family:var(--fb);font-size:12pt;line-height:1.8;
  color:#ebdcb9;margin-top:15px;font-style:italic}
@keyframes glowPulse{
  from{text-shadow:0 0 30px currentColor,0 0 60px currentColor}
  to{text-shadow:0 0 80px currentColor,0 0 150px currentColor,0 0 250px currentColor}}

#hud{position:fixed;bottom:5px;left:0;right:0;text-align:center;
  font-family:var(--fb);font-size:8pt;color:rgba(212,175,55,.4);
  letter-spacing:3px;font-style:italic;pointer-events:none;z-index:21}
</style>
</head>
<body>
<canvas id="c3d"></canvas>

<div id="hdr"><h1>Crónica de un Alma Estelar</h1><p>El Ritual del Destino</p></div>
<div id="instruccion"><p>✦ &nbsp; La energía cósmica aguarda tu magia &nbsp; ✦</p></div>

<div class="panel on" id="pe">
  <p class="ptit">Invocación</p>
  <p class="psub">Inscribe tu nombre e invoca tu poción</p>
  <input type="text" id="nom" class="campo" placeholder="Tu nombre mágico" maxlength="28" autocomplete="off">
  <div class="row">
    <button class="btn btn-n" onclick="votar('nino',this)"><span class="bico">🌊</span>Guardián Estelar</button>
    <button class="btn btn-f" onclick="votar('nina',this)"><span class="bico">🌸</span>Protectora Cósmica</button>
  </div>
</div>

<div class="panel" id="pw">
  <p class="ptit">Magia Sellada</p>
  <p class="psub">El cosmos revelará su secreto en:</p>
  <div id="reloj">Sincronizando...</div>
  <hr class="sep">
  <div class="bwrap"><div id="bn" style="width:50%"></div><div id="bf" style="width:50%"></div></div>
  <div class="vtxt"><span id="vn">🌊 0</span><span id="vf">0 🌸</span></div>
  <div id="revc" style="display:none;margin-top:20px"></div>
</div>
<div id="hud">Magia Procesada mediante WebGL & Bloom</div>

<script>
/* 1. FIREBASE (Reemplaza con tus datos reales) */
firebase.initializeApp({
  apiKey:"TU_API_KEY",
  authDomain:"TU_DOMINIO.firebaseapp.com",
  databaseURL:"https://TU_URL_DE_DATABASE.firebaseio.com",
  projectId:"TU_PROYECTO"
});
const db = firebase.database();

/* 2. TEXTURAS PROCEDURALES MÁGICAS */
function makeSoftCircle(size=128, inner=0.0, falloff=1.0){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(size/2,size/2,size*inner*0.5, size/2,size/2,size*0.5);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.3,'rgba(255,255,255,0.8)');
  g.addColorStop(falloff,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}
const TEX_SOFT = makeSoftCircle(128, 0.1, 0.9);

/* 3. SETUP 3D Y COMPOSER (BLOOM) */
let renderer, scene, camera, clock, composer;
let mouse={x:0,y:0}, mT={x:0,y:0};
let caldronGroup, liqMesh, bottleGroup, bottleLiqMesh, mainLight;

// Partículas
const PMAX = { smoke:200, spark:600, stream:300 };
const pools = { smoke:[], spark:[], stream:[] };
let pGeo = {}, pMesh = {};
let pourState = 'idle'; 
let targetColor = new THREE.Color(0.4, 0.1, 0.8);

function init(){
  const canvas=document.getElementById('c3d');
  renderer=new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x020105);
  renderer.toneMapping=THREE.ReinhardToneMapping;
  
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x020105, 0.015);
  
  camera=new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 500);
  camera.position.set(0, 3, 14);
  clock=new THREE.Clock();

  // POST-PROCESADO: LA MAGIA DEL BLOOM
  const renderScene = new THREE.RenderPass(scene, camera);
  const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
  bloomPass.threshold = 0.1; 
  bloomPass.strength = 1.8; // Intensidad del brillo
  bloomPass.radius = 0.8;
  
  composer = new THREE.EffectComposer(renderer);
  composer.addPass(renderScene);
  composer.addPass(bloomPass);

  buildLights();
  buildEnvironment();
  buildCaldron();
  buildBottle();
  buildParticleSystems();

  window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });
  window.addEventListener('mousemove',e=>{
    mT.x=(e.clientX/window.innerWidth-0.5)*2;
    mT.y=-(e.clientY/window.innerHeight-0.5)*2;
  });

  loop();
}

function buildLights(){
  scene.add(new THREE.AmbientLight(0x0a0514, 2.0));
  mainLight = new THREE.PointLight(0x8a3fbf, 5, 20);
  mainLight.position.set(0, 2, 0);
  scene.add(mainLight);
}

function buildEnvironment(){
  // Estrellas de fondo
  const g = new THREE.BufferGeometry();
  const p = new Float32Array(2000 * 3);
  for(let i=0; i<2000*3; i++) p[i] = (Math.random()-0.5) * 150;
  g.setAttribute('position', new THREE.BufferAttribute(p, 3));
  const m = new THREE.PointsMaterial({ color: 0xffe6a0, size: 0.15, transparent: true, opacity: 0.8 });
  scene.add(new THREE.Points(g, m));
}

function buildCaldron(){
  caldronGroup = new THREE.Group();
  caldronGroup.position.set(0, -2.5, 0);

  // Material oscuro reflectante
  const metal = new THREE.MeshStandardMaterial({color: 0x05030a, metalness: 0.9, roughness: 0.2});
  // Material brillante para el Bloom
  const gold = new THREE.MeshStandardMaterial({color: 0x000000, emissive: 0xd4af37, emissiveIntensity: 2.0});

  // Cuerpo
  const belly = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32, 0, Math.PI*2, 0, Math.PI*0.65), metal);
  belly.rotation.x = Math.PI;
  caldronGroup.add(belly);

  // Borde brillante
  const rim = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.15, 16, 64), gold);
  rim.position.y = 0.2;
  caldronGroup.add(rim);

  // Líquido Radiactivo (Reacciona al Bloom)
  const liqMat = new THREE.MeshStandardMaterial({
    color: 0x000000, emissive: 0x4a148c, emissiveIntensity: 4.0, transparent:true, opacity: 0.9
  });
  liqMesh = new THREE.Mesh(new THREE.CircleGeometry(2.4, 64), liqMat);
  liqMesh.rotation.x = -Math.PI/2;
  liqMesh.position.y = 0.1;
  caldronGroup.add(liqMesh);

  scene.add(caldronGroup);
}

function buildBottle(){
  bottleGroup = new THREE.Group();
  
  const glass = new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.2, metalness: 1.0});
  const gold = new THREE.MeshStandardMaterial({color: 0x000000, emissive: 0xd4af37, emissiveIntensity: 2.5});
  
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.5, 8), glass);
  bottleGroup.add(body);
  
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.4, 0.5, 8), glass);
  neck.position.y = 1.0;
  bottleGroup.add(neck);

  // Líquido del frasco
  bottleLiqMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.45, 1.2, 8), 
    new THREE.MeshStandardMaterial({color:0x000000, emissive: 0x8a2dbf, emissiveIntensity: 5.0})
  );
  bottleLiqMesh.position.y = -0.1;
  bottleGroup.add(bottleLiqMesh);

  bottleGroup.position.set(10, 10, 0); // Oculto al inicio
  scene.add(bottleGroup);
}

function makePool(key, N, size, color, blend){
  const g = new THREE.BufferGeometry();
  const p = new Float32Array(N*3); p.fill(9999);
  g.setAttribute('position', new THREE.BufferAttribute(p, 3));
  // El color lo empujamos al Emissive para que brille con el Bloom
  const m = new THREE.PointsMaterial({
    map: TEX_SOFT, size: size, color: color, transparent: true, opacity: 0.8,
    depthWrite: false, blending: blend
  });
  const mesh = new THREE.Points(g, m);
  scene.add(mesh);
  pGeo[key]=g; pMesh[key]=mesh;
  for(let i=0; i<N; i++) pools[key].push({x:0,y:0,z:0,vx:0,vy:0,vz:0,life:0, active:false, idx:i});
}

function buildParticleSystems(){
  makePool('smoke', PMAX.smoke, 3.0, 0x8a2dbf, THREE.AdditiveBlending);
  makePool('spark', PMAX.spark, 0.3, 0xffffff, THREE.AdditiveBlending);
  makePool('stream', PMAX.stream, 0.4, 0xffffff, THREE.AdditiveBlending);
}

function getFree(key){ return pools[key].find(p=>!p.active); }

function spawnSpark(x,y,z, isExplosion=false){
  const p = getFree('spark'); if(!p)return;
  p.active = true; p.x=x; p.y=y; p.z=z;
  const spd = isExplosion ? 0.2 + Math.random()*0.3 : 0.05 + Math.random()*0.05;
  const a = Math.random() * Math.PI*2;
  p.vx = Math.cos(a) * spd;
  p.vy = (Math.random() * 0.2) + (isExplosion ? 0.2 : 0.05);
  p.vz = Math.sin(a) * spd;
  p.life = 60 + Math.random()*40;
}

function startPour(tipo){
  if(pourState !== 'idle') return;
  pourState = 'animating';
  
  const isNino = tipo === 'nino';
  targetColor = isNino ? new THREE.Color(0x0088ff) : new THREE.Color(0xff0088);
  
  // Cambiar color del líquido en el frasco a ultra brillante
  bottleLiqMesh.material.emissive.copy(targetColor);
  pMesh.stream.material.color.copy(targetColor);

  let step = 0;
  const anim = setInterval(() => {
    step += 0.02;
    
    // Entra el frasco volando mágicamente
    if(step < 1) {
      bottleGroup.position.set(
        4 - (step * 2), 
        6 - (step * 2), 
        1
      );
      bottleGroup.rotation.z = -step * 1.5; // Se inclina
    } 
    // Vierte la poción
    else if (step < 3) {
      for(let i=0; i<4; i++){
        const st = getFree('stream');
        if(st) {
          st.active = true; 
          st.x = bottleGroup.position.x - 1; 
          st.y = bottleGroup.position.y - 1; 
          st.z = 1;
          st.vx = -0.05; st.vy = -0.15; st.vz = 0;
          st.life = 30;
        }
      }
      // Reacción de la caldera
      liqMesh.material.emissive.lerp(targetColor, 0.05);
      mainLight.color.lerp(targetColor, 0.05);
      spawnSpark(0, -2, 0, true);
    } 
    // Se va el frasco
    else if (step < 4) {
      bottleGroup.position.y += 0.1;
      bottleGroup.position.x += 0.1;
      bottleGroup.rotation.z += 0.05;
    } else {
      clearInterval(anim);
      bottleGroup.position.set(10,10,0);
      pourState = 'done';
    }
  }, 16);
}

function loop(){
  requestAnimationFrame(loop);
  const time = clock.getElapsedTime();

  mouse.x += (mT.x - mouse.x) * 0.05;
  mouse.y += (mT.y - mouse.y) * 0.05;

  camera.position.x += (mouse.x * 2 - camera.position.x) * 0.05;
  camera.position.y += (mouse.y * 1 + 3 - camera.position.y) * 0.05;
  camera.lookAt(0, -1, 0);

  if(caldronGroup) {
    caldronGroup.rotation.y = time * 0.2;
    liqMesh.position.y = 0.1 + Math.sin(time * 3) * 0.05; // Pulso del líquido
    mainLight.intensity = 3 + Math.sin(time * 5) * 1.5; // Luz parpadeante
  }

  if(bottleGroup && pourState === 'idle') {
    bottleGroup.position.y = 10 + Math.sin(time) * 0.5;
  }

  // Update Sparks
  const spa = pGeo.spark.attributes.position.array;
  pools.spark.forEach(p => {
    if(!p.active) return;
    p.life--;
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    p.vy -= 0.005; // Gravedad suave
    if(p.life <= 0) { p.active = false; spa[p.idx*3]=9999; }
    else { spa[p.idx*3]=p.x; spa[p.idx*3+1]=p.y; spa[p.idx*3+2]=p.z; }
  });
  pGeo.spark.attributes.position.needsUpdate = true;

  // Update Stream
  const sta = pGeo.stream.attributes.position.array;
  pools.stream.forEach(p => {
    if(!p.active) return;
    p.life--;
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    if(p.life <= 0) { p.active = false; sta[p.idx*3]=9999; }
    else { sta[p.idx*3]=p.x; sta[p.idx*3+1]=p.y; sta[p.idx*3+2]=p.z; }
  });
  pGeo.stream.attributes.position.needsUpdate = true;

  // USAR COMPOSER EN LUGAR DE RENDERER PARA ACTIVAR EL BLOOM
  composer.render();
}

function doReveal(sexo){
  const isN = sexo==='nino';
  const hex = isN ? '#7ec0ee' : '#f4b4ec';
  const cTarget = isN ? new THREE.Color(0x0088ff) : new THREE.Color(0xff0088);
  
  document.getElementById('revc').style.display='block';
  document.getElementById('revc').innerHTML=`<h1 style="color:${hex}">¡Es un${isN?' Niño':'a Niña'}!</h1>`;
  
  liqMesh.material.emissive.copy(cTarget);
  liqMesh.material.emissiveIntensity = 10.0; // Explosion de luz central
  mainLight.color.copy(cTarget);
  mainLight.intensity = 20.0;

  let count = 0;
  const expl = setInterval(() => {
    for(let i=0; i<30; i++) spawnSpark((Math.random()-0.5)*2, -2, (Math.random()-0.5)*2, true);
    count++;
    if(count > 20) clearInterval(expl);
  }, 100);
}

// Interfaz lógica igual a tu archivo original...
function votar(tipo,btn){
  const nom=document.getElementById('nom').value.trim();
  if(!nom) return alert("Inscribe tu nombre mágico.");
  document.querySelectorAll('.btn').forEach(b=>b.disabled=true);
  
  // db.ref... (Descomenta estas lineas cuando pongas tus credenciales arriba)
  // db.ref('registro_votos').push({familiar:nom,pocion:tipo});
  // db.ref('votos/'+tipo).transaction(v=>(v||0)+1);
  localStorage.setItem('votoEstelar',tipo);

  document.getElementById('instruccion').style.opacity='0';
  startPour(tipo);

  setTimeout(()=>{
    document.getElementById('pe').style.display='none';
    document.getElementById('pw').classList.add('on');
  }, 4000);
}

window.addEventListener('load',init);
</script>
</body>
</html>
