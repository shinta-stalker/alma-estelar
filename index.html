<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crónica de un Alma Estelar — El Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#030108;font-family:'IM Fell English',serif;color:#ebdcb9}

/* ── FONDO PARALLAX ── */
#bg{
  position:fixed;top:-8%;left:-8%;width:116%;height:116%;
  background-image:url('fondo.jpg');
  background-size:cover;background-position:center;
  z-index:0;will-change:transform;
  filter:brightness(0.72) saturate(1.15);
}

/* ── GRADIENTES DE OSCURECIMIENTO ── */
#vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, transparent 20%, rgba(2,1,8,0.55) 100%),
    linear-gradient(to bottom, rgba(2,1,8,0.6) 0%, transparent 18%, transparent 75%, rgba(2,1,8,0.85) 100%);
}

/* ── CANVAS VFX ── */
#vfx{position:fixed;inset:0;z-index:2;pointer-events:none}

/* ── UI LAYOUT ── */
#ui{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:24px 20px 22px;
}

/* ── TÍTULO ── */
.titulo-bloque{text-align:center;pointer-events:none}
.titulo-bloque h1{
  font-family:'Cinzel Decorative',serif;font-weight:400;
  font-size:clamp(10pt,2.2vw,15pt);letter-spacing:5px;
  color:#f7e47a;
  text-shadow:0 0 20px rgba(212,175,55,.95),0 0 55px rgba(212,175,55,.45),0 0 110px rgba(212,175,55,.2);
}
.titulo-bloque p{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:clamp(7.5pt,1.3vw,9.5pt);color:rgba(212,175,55,.5);
  letter-spacing:3px;margin-top:4px;
}

/* ── PANEL CRISTAL ── */
.panel{
  background:rgba(3,1,10,.82);
  border:1px solid rgba(212,175,55,.28);
  border-radius:16px;
  padding:20px 24px 18px;
  width:min(500px,92vw);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  box-shadow:
    0 0 0 1px rgba(212,175,55,.06),
    0 0 50px rgba(0,0,0,.8),
    0 0 100px rgba(212,175,55,.05),
    inset 0 1px 0 rgba(255,255,255,.08);
  text-align:center;
}
.panel-label{
  font-family:'Cinzel',serif;font-size:8pt;letter-spacing:3px;
  color:rgba(212,175,55,.45);text-transform:uppercase;margin-bottom:14px;
}

/* ── INPUT ── */
.campo{
  width:100%;padding:11px 16px;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(212,175,55,.26);border-radius:9px;
  color:#fff;font-size:11pt;font-family:'IM Fell English',serif;
  text-align:center;outline:none;
  transition:border-color .3s,box-shadow .3s;
  margin-bottom:16px;
}
.campo::placeholder{color:rgba(255,255,255,.2)}
.campo:focus{border-color:rgba(212,175,55,.65);box-shadow:0 0 22px rgba(212,175,55,.2)}

/* ── POCIONES ── */
.pociones-row{display:flex;justify-content:center;gap:clamp(20px,5vw,50px);align-items:flex-end}

.pocion-btn{
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;padding:0;
}
.pocion-btn:hover{transform:translateY(-14px) scale(1.08)}
.pocion-btn:active{transform:scale(.96)}

/* Las pociones son PNG con fondo negro → mix-blend-mode:screen elimina el negro */
.pocion-btn img{
  width:clamp(90px,13vw,145px);height:auto;
  mix-blend-mode:screen;
  filter:drop-shadow(0 0 8px rgba(0,0,0,.6));
  transition:filter .35s;
}
.pocion-btn.azul:hover img{
  filter:drop-shadow(0 0 22px #4fc3f7) drop-shadow(0 0 50px rgba(79,195,247,.6));
}
.pocion-btn.rosa:hover img{
  filter:drop-shadow(0 0 22px #f472b6) drop-shadow(0 0 50px rgba(244,114,182,.6));
}

.pocion-label{
  font-family:'Cinzel',serif;font-size:clamp(7pt,1.4vw,9pt);letter-spacing:2px;
  transition:color .3s;
}
.pocion-btn.azul .pocion-label{color:rgba(79,195,247,.7)}
.pocion-btn.rosa .pocion-label{color:rgba(244,114,182,.7)}
.pocion-btn.azul:hover .pocion-label{color:#4fc3f7;text-shadow:0 0 12px rgba(79,195,247,.8)}
.pocion-btn.rosa:hover .pocion-label{color:#f472b6;text-shadow:0 0 12px rgba(244,114,182,.8)}

/* ── PANEL ESPERA ── */
#reloj{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(15pt,3.5vw,22pt);
  letter-spacing:3px;color:#f7e47a;
  text-shadow:0 0 30px rgba(212,175,55,.85);
  margin:5px 0 14px;
}
.barra-wrap{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;display:flex}
#b-azul{height:100%;background:#4fc3f7;box-shadow:0 0 12px #4fc3f7;transition:width 1.5s ease}
#b-rosa{height:100%;background:#f472b6;box-shadow:0 0 12px #f472b6;transition:width 1.5s ease}
.votos-txt{display:flex;justify-content:space-between;font-size:7.5pt;margin-top:6px;color:rgba(212,175,55,.45);font-family:'Cinzel',serif;letter-spacing:1px}

/* ── REVELACIÓN ── */
#revc{display:none;margin-top:14px}
#revc h1{
  font-family:'Cinzel Decorative',serif;font-weight:700;
  font-size:clamp(17pt,4.5vw,28pt);letter-spacing:3px;
  animation:revGlow 1.9s ease-in-out infinite alternate;
}
#revc p{font-family:'IM Fell English',serif;font-size:10.5pt;line-height:1.75;color:#c8b898;margin-top:9px;font-style:italic}
@keyframes revGlow{
  from{text-shadow:0 0 20px currentColor,0 0 50px currentColor}
  to{text-shadow:0 0 60px currentColor,0 0 130px currentColor,0 0 260px currentColor}
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="vignette"></div>
<canvas id="vfx"></canvas>

<div id="ui">

  <div class="titulo-bloque">
    <h1>Crónica de un Alma Estelar</h1>
    <p>El Ritual del Destino</p>
  </div>

  <!-- PANEL VOTACIÓN -->
  <div class="panel" id="panel-voto">
    <p class="panel-label">Inscribe tu nombre e invoca tu poción</p>
    <input type="text" id="nombre" class="campo" placeholder="Tu nombre mágico" maxlength="28" autocomplete="off">
    <div class="pociones-row">
      <button class="pocion-btn azul" id="btn-azul" onclick="lanzarMagia('nino',this)">
        <img src="pocion-azul.png" alt="Guardián Estelar">
        <span class="pocion-label">Guardián Estelar</span>
      </button>
      <button class="pocion-btn rosa" id="btn-rosa" onclick="lanzarMagia('nina',this)">
        <img src="pocion-rosa.png" alt="Protectora Cósmica">
        <span class="pocion-label">Protectora Cósmica</span>
      </button>
    </div>
  </div>

  <!-- PANEL ESPERA -->
  <div class="panel" id="panel-espera" style="display:none">
    <p class="panel-label">La magia se acumula en el cosmos</p>
    <div id="reloj">Invocando…</div>
    <div class="barra-wrap"><div id="b-azul" style="width:50%"></div><div id="b-rosa" style="width:50%"></div></div>
    <div class="votos-txt"><span id="vt-azul">🌊 0</span><span id="vt-rosa">0 🌸</span></div>
    <div id="revc"></div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════════
   FIREBASE
════════════════════════════════════════════════ */
firebase.initializeApp({
  apiKey:"AIzaSyAivQlUAXmdyMgO-7TWrHeLQQlRyqg_JrU",
  authDomain:"cronica-de-un-alma-estelar.firebaseapp.com",
  databaseURL:"https://cronica-de-un-alma-estelar-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"cronica-de-un-alma-estelar",
  storageBucket:"cronica-de-un-alma-estelar.firebasestorage.app"
});
const db = firebase.database();

/* ════════════════════════════════════════════════
   CANVAS VFX ENGINE
════════════════════════════════════════════════ */
const canvas = document.getElementById('vfx');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Centro de la Semilla Cósmica en el fondo
const CX = () => W * 0.5;
const CY = () => H * 0.45;

/* ─── PARALLAX ─────────────────────────────── */
const bg = document.getElementById('bg');
let mx=0,my=0,tmx=0,tmy=0;
window.addEventListener('mousemove', e=>{
  tmx=(e.clientX/window.innerWidth  -0.5)*30;
  tmy=(e.clientY/window.innerHeight -0.5)*22;
});
window.addEventListener('deviceorientation',e=>{
  if(e.gamma!=null){tmx=(e.gamma/20)*15;tmy=((e.beta-45)/30)*12;}
});

/* ─── ESTADO VISUAL ─────────────────────────── */
const V = {
  // Glow central (la semilla en el fondo)
  glowR:220, glowA:0.14, glowPulse:0,
  glowCR:212, glowCG:175, glowCB:55,
  // Flash de pantalla
  flashA:0, flashCR:255, flashCG:255, flashCB:255,
  // Tinte persistente tras el voto
  tintA:0, tintCR:255, tintCG:255, tintCB:255,
  // Overlay de revelación
  revA:0, revCR:255, revCG:255, revCB:255,
};

/* ─── POOL DE PARTÍCULAS ────────────────────── */
const POOL = 900;
const pool = Array.from({length:POOL},()=>({
  on:false,x:0,y:0,vx:0,vy:0,
  life:0,ml:0,r:0,
  cr:255,cg:255,cb:255,
  type:'d',          // d=dust, b=burst, s=stream, w=wisp, r=reveal
  t:0,vt:0,          // stream bezier
  sx:0,sy:0,ex:0,ey:0,cpx:0,cpy:0
}));

const FREE=()=>pool.find(p=>!p.on);

function dust(){
  const p=FREE();if(!p)return;
  p.on=true;p.type='d';
  p.x=Math.random()*W; p.y=H+8;
  p.vx=(Math.random()-.5)*.6; p.vy=-(0.5+Math.random()*.9);
  p.r=.8+Math.random()*2.2;
  p.cr=212; p.cg=160+Math.random()*80|0; p.cb=40+Math.random()*90|0;
  p.ml=p.life=160+Math.random()*220;
}

function wisp(){
  const p=FREE();if(!p)return;
  p.on=true;p.type='w';
  const s=Math.random()>.5;
  p.x=s?-60:W+60; p.y=H*.15+Math.random()*H*.7;
  p.vx=s?.35+Math.random()*.5:-(0.35+Math.random()*.5);
  p.vy=(Math.random()-.5)*.25;
  p.r=35+Math.random()*60;
  p.cr=140+Math.random()*100|0; p.cg=60+Math.random()*70|0; p.cb=210+Math.random()*45|0;
  p.ml=p.life=380+Math.random()*350;
}

function burst(x,y,cr,cg,cb,n=80,spd=1){
  for(let i=0;i<n;i++){
    const p=FREE();if(!p)continue;
    p.on=true;p.type='b';
    p.x=x+(Math.random()-.5)*14; p.y=y+(Math.random()-.5)*14;
    const a=Math.random()*Math.PI*2;
    const s=(.4+Math.random()*2.8)*spd;
    p.vx=Math.cos(a)*s; p.vy=Math.sin(a)*s-.4;
    p.r=1.5+Math.random()*6;
    p.cr=cr;p.cg=cg;p.cb=cb;
    p.ml=p.life=55+Math.random()*100;
  }
}

function stream(bx,by,cr,cg,cb){
  const p=FREE();if(!p)return;
  p.on=true;p.type='s';
  p.sx=bx+(Math.random()-.5)*40; p.sy=by+(Math.random()-.5)*40;
  p.ex=CX()+(Math.random()-.5)*25; p.ey=CY()+(Math.random()-.5)*25;
  p.cpx=(p.sx+p.ex)/2+(Math.random()-.5)*120;
  p.cpy=Math.min(p.sy,p.ey)-60-Math.random()*130;
  p.vt=.02+Math.random()*.018; p.t=0;
  p.r=2.5+Math.random()*5.5;
  p.cr=cr;p.cg=cg;p.cb=cb;
  p.ml=p.life=Math.ceil(1/p.vt);
}

function reveal(cr,cg,cb){
  for(let i=0;i<350;i++){
    const p=FREE();if(!p)continue;
    p.on=true;p.type='r';
    p.x=CX()+(Math.random()-.5)*W*.6; p.y=CY()+(Math.random()-.5)*H*.6;
    const a=Math.random()*Math.PI*2, s=.8+Math.random()*5.5;
    p.vx=Math.cos(a)*s; p.vy=Math.sin(a)*s;
    p.r=2+Math.random()*12;
    p.cr=cr;p.cg=cg;p.cb=cb;
    p.ml=p.life=70+Math.random()*130;
  }
}

/* ─── DRAW HELPER ───────────────────────────── */
function glow(x,y,r,cr,cg,cb,a){
  if(a<=0)return;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,  `rgba(${cr},${cg},${cb},${a})`);
  g.addColorStop(.4, `rgba(${cr},${cg},${cb},${a*.45})`);
  g.addColorStop(1,  `rgba(${cr},${cg},${cb},0)`);
  ctx.fillStyle=g;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

/* ─── EFECTOS DE PANTALLA ───────────────────── */
let shockwaves=[];
function shockwave(x,y,cr,cg,cb,big=false){
  shockwaves.push({x,y,r:big?20:10,maxR:big?Math.max(W,H)*.9:320,cr,cg,cb,a:big?.9:.7,lw:big?4:2.5});
}

/* ─── LIGHTNING BEAM ────────────────────────── */
let bolt={on:false,x1:0,y1:0,a:0,cr:0,cg:0,cb:0};
function fireBolt(x,y,cr,cg,cb){
  bolt={on:true,x1:x,y1:y,a:.95,cr,cg,cb};
}
function drawBolt(){
  if(!bolt.on)return;
  bolt.a-=.03;
  if(bolt.a<=0){bolt.on=false;return;}
  const x2=CX(),y2=CY();
  // Línea principal brillante
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.strokeStyle=`rgba(${bolt.cr},${bolt.cg},${bolt.cb},${bolt.a})`;
  ctx.lineWidth=3+bolt.a*5;ctx.lineCap='round';
  ctx.shadowBlur=28;ctx.shadowColor=`rgba(${bolt.cr},${bolt.cg},${bolt.cb},${bolt.a})`;
  ctx.beginPath();ctx.moveTo(bolt.x1,bolt.y1);ctx.lineTo(x2,y2);ctx.stroke();
  // Halo exterior
  ctx.lineWidth=(3+bolt.a*5)*6;ctx.globalAlpha=bolt.a*.12;ctx.shadowBlur=0;ctx.stroke();
  ctx.restore();
  // Ramas de relámpago (se regeneran cada frame para efecto de chisporreo)
  const BRANCHES=4;
  for(let b=0;b<BRANCHES;b++){
    const t=.2+b*.18;
    const lx=lerp(bolt.x1,x2,t), ly=lerp(bolt.y1,y2,t);
    const bx=lx+(Math.random()-.5)*100, by=ly+(Math.random()-.5)*100;
    ctx.save();ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle=`rgba(${bolt.cr},${bolt.cg},${bolt.cb},${bolt.a*.4})`;
    ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.shadowBlur=15;ctx.shadowColor=`rgba(${bolt.cr},${bolt.cg},${bolt.cb},${bolt.a*.4})`;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(bx,by);ctx.stroke();
    ctx.restore();
  }
}

/* ─── SHOOTING STAR ─────────────────────────── */
let star=null;
function newStar(){
  if(star)return;
  star={x:Math.random()*W*.65,y:-20,vx:4+Math.random()*5,vy:2.5+Math.random()*3,a:1,trail:[]};
}

/* ─── ESTADO DE BEAM ────────────────────────── */
let beamOn=false,beamTick=0,beamX=0,beamY=0;
let bCR=79,bCG=195,bCB=247;
let hoveredBtn=null;
let frame=0;
let revealDone=false;

/* ─── MAIN RENDER ───────────────────────────── */
function render(){
  requestAnimationFrame(render);
  frame++;

  // Parallax
  mx+=(tmx-mx)*.065; my+=(tmy-my)*.065;
  bg.style.transform=`translate(${-mx}px,${-my}px)`;

  ctx.clearRect(0,0,W,H);

  // 1 ── GLOW CENTRAL PULSANTE (la semilla cósmica del fondo)
  V.glowPulse+=.018;
  const pa=V.glowA*(0.68+0.32*Math.sin(V.glowPulse));
  const pr=V.glowR*(0.9+0.1*Math.sin(V.glowPulse*.62));
  glow(CX(),CY(),pr,V.glowCR,V.glowCG,V.glowCB,pa);
  glow(CX(),CY(),pr*1.9,V.glowCR,V.glowCG,V.glowCB,pa*.22);
  // Brillo menor que late a distinto ritmo
  glow(CX(),CY(),pr*.45,V.glowCR,V.glowCG,V.glowCB,pa*.55);

  // 2 ── BOLT / RAYO
  drawBolt();

  // 3 ── BEAM STREAM (emitir partículas mientras beamOn)
  if(beamOn){
    beamTick--;
    for(let i=0;i<7;i++) stream(beamX,beamY,bCR,bCG,bCB);
    if(beamTick<=0){
      beamOn=false;
      // IMPACTO: cambio de glow, burst masivo, shockwaves
      V.glowCR=bCR;V.glowCG=bCG;V.glowCB=bCB;
      V.glowA=.55;V.glowR=320;
      burst(CX(),CY(),bCR,bCG,bCB,220,2.8);
      shockwave(CX(),CY(),bCR,bCG,bCB,true);
      shockwave(CX(),CY(),255,255,255,false);
      shockwave(CX(),CY(),bCR,bCG,bCB,false);
      V.flashA=.75;V.flashCR=bCR;V.flashCG=bCG;V.flashCB=bCB;
      V.tintA=.1;V.tintCR=bCR;V.tintCG=bCG;V.tintCB=bCB;
    }
  }

  // 4 ── SHOCKWAVES
  for(let i=shockwaves.length-1;i>=0;i--){
    const s=shockwaves[i];
    s.r+=s.maxR>400?22:14;
    s.a-=s.maxR>400?.01:.022;
    if(s.a<=0||s.r>s.maxR){shockwaves.splice(i,1);continue;}
    ctx.save();ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle=`rgba(${s.cr},${s.cg},${s.cb},${s.a})`;
    ctx.lineWidth=s.lw;
    ctx.shadowBlur=22;ctx.shadowColor=`rgba(${s.cr},${s.cg},${s.cb},${s.a})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // 5 ── PARTÍCULAS
  pool.forEach(p=>{
    if(!p.on)return;
    p.life--;
    const pf=p.life/p.ml;

    if(p.type==='d'){
      p.x+=p.vx;p.y+=p.vy;
      if(p.life<=0||p.y<-10){p.on=false;return;}
      ctx.save();ctx.globalCompositeOperation='lighter';
      // Twinkle: parpadeo suave
      const twink=.55+.45*Math.sin(frame*.1+p.x);
      ctx.fillStyle=`rgba(${p.cr},${p.cg},${p.cb},${pf*twink*.8})`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      // Halo en las más grandes
      if(p.r>1.8){
        glow(p.x,p.y,p.r*3.5,p.cr,p.cg,p.cb,pf*twink*.18);
      }
      ctx.restore();
    }
    else if(p.type==='w'){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-100||p.x>W+100||p.life<=0){p.on=false;return;}
      glow(p.x,p.y,p.r,p.cr,p.cg,p.cb,p.life/p.ml*.09);
    }
    else if(p.type==='b'){
      p.vy+=.06; // gravedad
      p.vx*=.96;p.vy*=.96;
      p.x+=p.vx;p.y+=p.vy;
      if(p.life<=0){p.on=false;return;}
      glow(p.x,p.y,p.r*pf*1.8,p.cr,p.cg,p.cb,pf*.9);
    }
    else if(p.type==='s'){
      p.t+=p.vt;
      if(p.t>=1||p.life<=0){
        if(Math.random()<.25) burst(CX(),CY(),p.cr,p.cg,p.cb,2,.7);
        p.on=false;return;
      }
      const mt=1-p.t;
      p.x=mt*mt*p.sx+2*mt*p.t*p.cpx+p.t*p.t*p.ex;
      p.y=mt*mt*p.sy+2*mt*p.t*p.cpy+p.t*p.t*p.ey;
      const sa=Math.sin(p.t*Math.PI);
      glow(p.x,p.y,p.r*sa,p.cr,p.cg,p.cb,sa*.95);
    }
    else if(p.type==='r'){
      p.vx*=.97;p.vy=p.vy*.97+.025;
      p.x+=p.vx;p.y+=p.vy;
      if(p.life<=0){p.on=false;return;}
      glow(p.x,p.y,p.r*pf*2.2,p.cr,p.cg,p.cb,pf*.95);
    }
  });

  // 6 ── HOVER GLOW en los botones de poción
  if(hoveredBtn){
    const el=document.getElementById('btn-'+hoveredBtn);
    if(el){
      const rc=el.getBoundingClientRect();
      const bx=rc.left+rc.width/2, by=rc.top+rc.height/2;
      const isA=hoveredBtn==='azul';
      const ha=.22+.08*Math.sin(frame*.07);
      glow(bx,by,120,isA?79:244,isA?195:114,isA?247:182,ha);
      glow(bx,by,55,255,255,255,ha*.3);
    }
  }

  // 7 ── FLASH
  if(V.flashA>0){
    V.flashA=Math.max(0,V.flashA-.022);
    ctx.save();ctx.globalCompositeOperation='lighter';
    ctx.fillStyle=`rgba(${V.flashCR},${V.flashCG},${V.flashCB},${V.flashA})`;
    ctx.fillRect(0,0,W,H);ctx.restore();
  }

  // 8 ── TINTE PERSISTENTE
  if(V.tintA>0){
    ctx.save();
    ctx.fillStyle=`rgba(${V.tintCR},${V.tintCG},${V.tintCB},${V.tintA})`;
    ctx.fillRect(0,0,W,H);ctx.restore();
  }

  // 9 ── OVERLAY DE REVELACIÓN
  if(V.revA>0){
    ctx.save();ctx.globalCompositeOperation='lighter';
    const rg=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),Math.max(W,H)*.9);
    rg.addColorStop(0,`rgba(${V.revCR},${V.revCG},${V.revCB},${V.revA*.85})`);
    rg.addColorStop(.45,`rgba(${V.revCR},${V.revCG},${V.revCB},${V.revA*.3})`);
    rg.addColorStop(1,`rgba(${V.revCR},${V.revCG},${V.revCB},0)`);
    ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);ctx.restore();
  }

  // 10 ── SHOOTING STAR
  if(star){
    star.trail.push({x:star.x,y:star.y});
    if(star.trail.length>28)star.trail.shift();
    star.x+=star.vx;star.y+=star.vy;
    star.a-=.013;
    ctx.save();ctx.globalCompositeOperation='lighter';
    for(let i=0;i<star.trail.length;i++){
      const t=i/star.trail.length;
      ctx.fillStyle=`rgba(255,248,220,${t*star.a*.9})`;
      ctx.beginPath();ctx.arc(star.trail[i].x,star.trail[i].y,1.8*t,0,Math.PI*2);ctx.fill();
    }
    glow(star.x,star.y,12,255,248,200,star.a*.6);
    ctx.restore();
    if(star.x>W+80||star.y>H+80||star.a<=0)star=null;
  }

  // ── SPAWN AMBIENT ──
  {
    const dc=pool.filter(p=>p.on&&p.type==='d').length;
    if(frame%2===0&&dc<130)dust();
    if(frame%200===0&&pool.filter(p=>p.on&&p.type==='w').length<7)wisp();
    if(frame%700===0)newStar();
  }
}

function lerp(a,b,t){return a+(b-a)*t;}

/* ─── HOVER LISTENERS ─── */
['azul','rosa'].forEach(t=>{
  const el=document.getElementById('btn-'+t);
  if(!el)return;
  el.addEventListener('mouseenter',()=>hoveredBtn=t);
  el.addEventListener('mouseleave',()=>hoveredBtn=null);
});

render(); // arrancar loop

/* ════════════════════════════════════════════════
   VOTACIÓN
════════════════════════════════════════════════ */
function lanzarMagia(tipo,btnEl){
  const nom=document.getElementById('nombre').value.trim();
  if(!nom){
    const el=document.getElementById('nombre');
    el.style.borderColor='#c0392b';el.focus();
    setTimeout(()=>el.style.borderColor='',1400);
    return;
  }
  document.querySelectorAll('.pocion-btn').forEach(b=>{b.disabled=true;b.style.opacity='.45';});

  const isN=tipo==='nino';
  bCR=isN?79:244; bCG=isN?195:114; bCB=isN?247:182;

  const rc=btnEl.getBoundingClientRect();
  beamX=rc.left+rc.width/2;
  beamY=rc.top+rc.height/2;

  // 1. Destello instantáneo en el botón
  burst(beamX,beamY,bCR,bCG,bCB,90,1.6);
  burst(beamX,beamY,255,255,255,30,.8);
  V.flashA=.55;V.flashCR=bCR;V.flashCG=bCG;V.flashCB=bCB;

  // 2. Rayo instantáneo
  fireBolt(beamX,beamY,bCR,bCG,bCB);

  // 3. Stream de partículas por ~1.6s
  beamOn=true;beamTick=95;

  // Firebase
  db.ref('registro_votos').push({familiar:nom,pocion:tipo,fecha:new Date().toISOString()});
  db.ref('votos/'+tipo).transaction(v=>(v||0)+1);
  localStorage.setItem('votoEstelar',tipo);

  setTimeout(()=>{
    document.getElementById('panel-voto').style.display='none';
    document.getElementById('panel-espera').style.display='block';
    escucharVotos();
  },3000);
}

/* ════════════════════════════════════════════════
   REVELACIÓN
════════════════════════════════════════════════ */
function doReveal(sexo){
  if(revealDone)return;revealDone=true;
  const isN=sexo==='nino';
  const cr=isN?79:244, cg=isN?195:114, cb=isN?247:182;
  const hex=isN?'#7ec0ee':'#f4b4ec';
  const tit=isN?'¡Es un Niño!':'¡Es una Niña!';
  const txt=isN?'Un pequeño Guardián Estelar viene en camino.<br>Las constelaciones cantan en su honor.':
                'Una pequeña Protectora Cósmica viene en camino.<br>Las estrellas danzan en su nombre.';

  document.getElementById('revc').style.display='block';
  document.getElementById('revc').innerHTML=`<h1 style="color:${hex}">${tit}</h1><p>${txt}</p>`;

  V.glowCR=cr;V.glowCG=cg;V.glowCB=cb;V.glowA=.7;V.glowR=380;
  V.revCR=cr;V.revCG=cg;V.revCB=cb;V.revA=.55;
  V.flashA=.9;V.flashCR=cr;V.flashCG=cg;V.flashCB=cb;

  for(let w=0;w<14;w++) setTimeout(()=>{
    reveal(cr,cg,cb);
    shockwave(CX(),CY(),cr,cg,cb,w<3);
    if(w===0)burst(CX(),CY(),255,255,255,120,3);
  },w*220);
}

/* ════════════════════════════════════════════════
   FIREBASE LISTENERS
════════════════════════════════════════════════ */
function escucharVotos(){
  db.ref('votos').on('value',snap=>{
    const d=snap.val()||{nino:0,nina:0};
    const n=d.nino||0,f=d.nina||0,tot=n+f;
    const pn=tot>0?n/tot*100:50;
    document.getElementById('b-azul').style.width=pn+'%';
    document.getElementById('b-rosa').style.width=(100-pn)+'%';
    document.getElementById('vt-azul').textContent='🌊 '+n;
    document.getElementById('vt-rosa').textContent=f+' 🌸';
  });
}

db.ref('config/revelacion').on('value',snap=>{
  const cfg=snap.val();if(!cfg)return;
  const ft=new Date(cfg.fechaHoraReveal).getTime();
  const el=document.getElementById('reloj');
  const iv=setInterval(()=>{
    const d=ft-Date.now();
    if(d<=0){clearInterval(iv);el.textContent='✦ EL PORTAL SE ABRIÓ ✦';doReveal(cfg.sexoReal);}
    else{
      const dd=Math.floor(d/86400000),hh=Math.floor(d%86400000/3600000),
            mm=Math.floor(d%3600000/60000),ss=Math.floor(d%60000/1000);
      el.textContent=`${dd}d ${String(hh).padStart(2,'0')}h ${String(mm).padStart(2,'0')}m ${String(ss).padStart(2,'0')}s`;
    }
  },1000);
});

if(localStorage.getItem('votoEstelar')){
  window.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('panel-voto').style.display='none';
    document.getElementById('panel-espera').style.display='block';
    escucharVotos();
  });
}
