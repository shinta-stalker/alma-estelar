<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crónica de un Alma Estelar — El Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #050308; font-family: 'IM Fell English', serif; color: #ebdcb9; }
    
    /* EL FONDO 2.5D (Efecto Parallax) */
    #lienzo-fondo {
        position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
        background-image: url('fondo.jpg'); /* TU ILUSTRACIÓN OFICIAL AQUÍ */
        background-size: cover; background-position: center;
        z-index: 0; transition: transform 0.2s ease-out; filter: brightness(0.8) contrast(1.1);
    }
    
    /* LA CAPA DE MAGIA (Canvas VFX) */
    #magia-vfx { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

    /* UI Y CRISTAL */
    #ui-container { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px; }
    
    .titulos { text-align: center; background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, transparent 80%); padding: 20px 40px; border-radius: 50%; pointer-events: none;}
    h1 { font-family: 'Cinzel Decorative', serif; font-size: clamp(18pt, 4vw, 28pt); color: #f5d76e; text-shadow: 0 0 20px #d4af37, 0 0 40px #d4af37; letter-spacing: 4px; }
    p.subtitulo { font-size: 14pt; color: #d4af37; letter-spacing: 3px; font-style: italic; margin-top: 5px; opacity: 0.8; }

    .panel-alquimia {
        background: rgba(10, 5, 15, 0.65); border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 20px; padding: 30px; width: min(450px, 100%);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.1);
        text-align: center;
    }

    .input-magico {
        width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 10px;
        color: #fff; font-size: 14pt; font-family: 'IM Fell English', serif;
        text-align: center; outline: none; transition: 0.3s; margin-bottom: 25px;
    }
    .input-magico:focus { border-color: #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

    /* BOTONES POCIONES (Tus imágenes) */
    .pociones-grid { display: flex; justify-content: center; gap: 30px; }
    .pocion-btn {
        background: none; border: none; cursor: pointer; position: relative;
        transition: transform 0.3s, filter 0.3s;
    }
    .pocion-btn img { width: 100px; height: auto; border-radius: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); mix-blend-mode: screen; }
    .pocion-btn:hover { transform: translateY(-10px) scale(1.05); filter: drop-shadow(0 0 20px rgba(255,255,255,0.6)); }
    .pocion-btn.azul:hover img { filter: drop-shadow(0 0 20px #4fc3f7); }
    .pocion-btn.rosa:hover img { filter: drop-shadow(0 0 20px #f06292); }
    
    .pocion-label { font-family: 'Cinzel', serif; font-size: 10pt; color: #ebdcb9; margin-top: 10px; display: block; letter-spacing: 2px; }

    /* PANEL ESPERA */
    #reloj { font-family: 'Cinzel Decorative', serif; font-size: 26pt; color: #f5d76e; text-shadow: 0 0 30px #d4af37; margin: 15px 0; }
    .barra-magica { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; display: flex; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    #barra-azul { height: 100%; background: #4fc3f7; transition: width 1s; box-shadow: 0 0 15px #4fc3f7; }
    #barra-rosa { height: 100%; background: #f06292; transition: width 1s; box-shadow: 0 0 15px #f06292; }

</style>
</head>
<body>

<div id="lienzo-fondo"></div>

<canvas id="magia-vfx"></canvas>

<div id="ui-container">
    <div class="titulos">
        <h1>Crónica de un Alma Estelar</h1>
        <p class="subtitulo">El Ritual del Destino</p>
    </div>

    <div class="panel-alquimia" id="panel-voto">
        <input type="text" id="nombre-familiar" class="input-magico" placeholder="Inscribe tu nombre mágico" autocomplete="off">
        <div class="pociones-grid">
            <button class="pocion-btn azul" onclick="lanzarMagia('nino', event)">
                <img src="pocion-azul.png" alt="Poción Niño">
                <span class="pocion-label">Guardián Estelar</span>
            </button>
            <button class="pocion-btn rosa" onclick="lanzarMagia('nina', event)">
                <img src="pocion-rosa.png" alt="Poción Niña">
                <span class="pocion-label">Protectora Cósmica</span>
            </button>
        </div>
    </div>

    <div class="panel-alquimia" id="panel-espera" style="display:none;">
        <p class="subtitulo">La Magia se acumula en el centro...</p>
        <div id="reloj">Sincronizando...</div>
        <div class="barra-magica">
            <div id="barra-azul" style="width: 50%;"></div>
            <div id="barra-rosa" style="width: 50%;"></div>
        </div>
    </div>
</div>

<script>
    /* 1. CONFIGURACIÓN DE FIREBASE (Reemplaza con las tuyas) */
    const firebaseConfig = { apiKey: "TU_API_KEY", databaseURL: "https://TU_BD.firebaseio.com", projectId: "TU_ID" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /* 2. PARALLAX DEL FONDO */
    const fondo = document.getElementById('lienzo-fondo');
    window.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20; // 20px de movimiento max
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        fondo.style.transform = `translate(${-x}px, ${-y}px)`;
    });

    /* 3. MOTOR DE MAGIA VISUAL (CANVAS 2D VFX) */
    const canvas = document.getElementById('magia-vfx');
    const ctx = canvas.getContext('2d');
    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    
    let particulas = [];
    let pulsosEnergia = [];
    
    // Polvo de estrellas ambiental
    class PolvoEstelar {
        constructor() {
            this.x = Math.random() * W; this.y = Math.random() * H;
            this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5 - 0.2;
            this.size = Math.random() * 2; this.alpha = Math.random();
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if(this.y < 0) this.y = H;
            if(this.x < 0) this.x = W; else if(this.x > W) this.x = 0;
            ctx.fillStyle = `rgba(212, 175, 55, ${this.alpha})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }
    for(let i=0; i<150; i++) particulas.push(new PolvoEstelar());

    // Haz de magia hacia el centro
    class CometaMagico {
        constructor(startX, startY, color) {
            this.x = startX; this.y = startY;
            this.targetX = W/2; this.targetY = H/2; // Centro de la imagen
            this.color = color;
            this.progreso = 0;
        }
        update() {
            this.progreso += 0.02;
            const ease = 1 - Math.pow(1 - this.progreso, 3); // Aceleración fluida
            const currentX = this.x + (this.targetX - this.x) * ease;
            const currentY = this.y + (this.targetY - this.y) * ease;
            
            // Dibujar destello
            ctx.globalCompositeOperation = 'lighter';
            let grad = ctx.createRadialGradient(currentX, currentY, 0, currentX, currentY, 20);
            grad.addColorStop(0, '#fff'); grad.addColorStop(0.2, this.color); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(currentX, currentY, 20, 0, Math.PI*2); ctx.fill();
            
            return this.progreso >= 1; // Retorna true si llegó
        }
    }

    let glowCentroColor = 'transparent';
    let glowCentroAlpha = 0;

    function renderizarMagia() {
        ctx.clearRect(0, 0, W, H);
        ctx.globalCompositeOperation = 'source-over';
        
        // Dibujar polvo ambiental
        particulas.forEach(p => p.update());

        // Dibujar brillo en el centro (donde se acumula la magia)
        if(glowCentroAlpha > 0) {
            ctx.globalCompositeOperation = 'lighter';
            let g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 300);
            g.addColorStop(0, glowCentroColor); g.addColorStop(1, 'transparent');
            ctx.globalAlpha = glowCentroAlpha;
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(W/2, H/2, 300, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
            glowCentroAlpha -= 0.005; // Se desvanece suavemente
        }

        // Dibujar proyectiles de magia
        for (let i = pulsosEnergia.length - 1; i >= 0; i--) {
            if (pulsosEnergia[i].update()) {
                // Cuando el proyectil llega al centro, explota en brillo
                glowCentroColor = pulsosEnergia[i].color === '#4fc3f7' ? 'rgba(79, 195, 247, 0.8)' : 'rgba(240, 98, 146, 0.8)';
                glowCentroAlpha = 1;
                pulsosEnergia.splice(i, 1);
            }
        }
        requestAnimationFrame(renderizarMagia);
    }
    renderizarMagia();

    /* 4. LÓGICA DE VOTACIÓN Y ANIMACIÓN */
    function lanzarMagia(tipo, event) {
        const nom = document.getElementById('nombre-familiar').value.trim();
        if(!nom) return alert("Por favor, inscribe tu nombre en el pergamino.");

        // Crear haz de luz desde donde se hizo clic
        const btnRect = event.currentTarget.getBoundingClientRect();
        const startX = btnRect.left + btnRect.width / 2;
        const startY = btnRect.top + btnRect.height / 2;
        const colorLuz = tipo === 'nino' ? '#4fc3f7' : '#f06292';
        
        // Disparar 3 cometas mágicos
        for(let i=0; i<3; i++) {
            setTimeout(() => pulsosEnergia.push(new CometaMagico(startX, startY, colorLuz)), i * 150);
        }

        // Firebase logic...
        // db.ref('registro_votos').push({familiar:nom, pocion:tipo});
        // db.ref('votos/'+tipo).transaction(v=>(v||0)+1);
        localStorage.setItem('votoEstelar', tipo);

        // Cambiar paneles tras el efecto
        setTimeout(() => {
            document.getElementById('panel-voto').style.display = 'none';
            document.getElementById('panel-espera').style.display = 'block';
            escucharVotos();
        }, 1500);
    }

    /* 5. RESPUESTA DE DATOS */
    function escucharVotos() {
        db.ref('votos').on('value', snap => {
            const d = snap.val() || { nino: 0, nina: 0 };
            const n = d.nino || 0, f = d.nina || 0, tot = n + f;
            if(tot > 0) {
                document.getElementById('barra-azul').style.width = (n / tot * 100) + '%';
                document.getElementById('barra-rosa').style.width = (f / tot * 100) + '%';
            }
        });
    }

    // Adaptar canvas al redimensionar
    window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

</script>
</body>
</html>
